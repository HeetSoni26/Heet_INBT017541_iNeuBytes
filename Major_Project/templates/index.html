<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBot - Movie Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>🎬 CineBot</h2>
            <p>Your Personal Movie Companion</p>
        </header>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hello! I am CineBot. I love talking about movies. What's on your mind?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
